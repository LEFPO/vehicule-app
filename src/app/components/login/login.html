<div class="login-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Connexion</mat-card-title>
      <mat-card-subtitle>Accédez à votre espace</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" placeholder="votre@email.com"/>
          <mat-error *ngIf="form.get('email')?.hasError('required')">Email requis</mat-error>
          <mat-error *ngIf="form.get('email')?.hasError('email')">Format invalide</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Mot de passe</mat-label>
          <input matInput type="password" formControlName="motDePasse"/>
          <mat-error *ngIf="form.get('motDePasse')?.hasError('required')">Mot de passe requis</mat-error>
        </mat-form-field>

        <p class="erreur" *ngIf="erreur">{{ erreur }}</p>

        <button mat-raised-button color="primary" type="submit"
                [disabled]="chargement" class="full-width">
          {{ chargement ? 'Connexion...' : 'Se connecter' }}
        </button>

      </form>
    </mat-card-content>

    <mat-card-actions>
      <p>Pas encore de compte ? <a routerLink="/register">S'inscrire</a></p>
    </mat-card-actions>
  </mat-card>
</div>
