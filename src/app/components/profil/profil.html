<mat-toolbar color="primary">
  <button mat-icon-button routerLink="/dashboard">
    <mat-icon>arrow_back</mat-icon>
  </button>
  <span>Mon profil</span>
</mat-toolbar>

<div class="profil-container">
  <mat-card class="avatar-card">
    <mat-card-content>
      <div class="avatar">
        <mat-icon>account_circle</mat-icon>
        <h2>{{ form.get('nom')?.value }}</h2>
        <p>{{ form.get('email')?.value }}</p>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>Modifier mes informations</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nom complet</mat-label>
          <input matInput formControlName="nom"/>
          <mat-error>Nom requis</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email"/>
          <mat-error>Email requis</mat-error>
        </mat-form-field>

        <p class="erreur" *ngIf="erreur">{{ erreur }}</p>

        <div class="form-actions">
          <button mat-button type="button" routerLink="/dashboard">Annuler</button>
          <button mat-raised-button color="primary" type="submit" [disabled]="chargement">
            {{ chargement ? 'Enregistrement...' : 'Sauvegarder' }}
          </button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>

  <mat-card class="danger-card">
    <mat-card-header>
      <mat-card-title>Session</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p>Se déconnecter de l'application.</p>
      <button mat-raised-button color="warn" (click)="logout()">
        <mat-icon>logout</mat-icon> Se déconnecter
      </button>
    </mat-card-content>
  </mat-card>
</div>
